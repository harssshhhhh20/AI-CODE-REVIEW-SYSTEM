spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: ai-code-review-system

  datasource:
    url: jdbc:postgresql://localhost:5432/ai_code_review
    username: harsh
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: codesage

openrouter:
  api-key: ${OPENROUTER_API_KEY}
  model: nvidia/nemotron-nano-9b-v2:free

github:
  token: ${GITHUB_TOKEN}

jwt:
  secret: ${JWT_SECRET_KEY}
  expiration: 86400000